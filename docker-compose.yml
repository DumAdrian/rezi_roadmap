version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: rezi
      POSTGRES_PASSWORD: rezipassword
      POSTGRES_DB: rezidb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://rezi:rezipassword@db:5432/rezidb
    depends_on:
      - db
    volumes:
      - ./app:/app/app

volumes:
  postgres_data:
