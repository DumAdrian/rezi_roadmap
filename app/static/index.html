<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezi Roadmap</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <!-- Main header that updates dynamically -->
        <header id="main-header">
            <button id="back-btn" class="hidden"><i class="fa-solid fa-arrow-left"></i></button>
            <h1 id="page-title">Trixy's progress</h1>
        </header>

        <!-- Books View -->
        <main id="books-view" class="view active">
            <div id="books-container" class="books-grid">
                <!-- Books will be injected here via JS -->
            </div>
        </main>

        <!-- Chapters View -->
        <main id="chapters-view" class="view hidden">
            <div id="chapters-container" class="chapters-list">
                <!-- Chapters will be injected here via JS -->
            </div>
        </main>
    </div>
    
    <script src="/static/script.js"></script>
</body>
</html>
